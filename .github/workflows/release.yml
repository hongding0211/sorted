name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release, for example v0.1.0"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: sorted

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
            binary_name: sorted
          - os: macos-14
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary_name: sorted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --locked --release --target "${{ matrix.target }}"

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Package artifact
        shell: bash
        run: |
          scripts/package-release.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ matrix.target }}" \
            "${{ matrix.archive_ext }}" \
            "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" \
            dist

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Create checksum manifest
        shell: bash
        run: |
          cp scripts/install.sh dist/sorted-install.sh
          python3 - <<'PY'
          import hashlib
          import shutil
          from pathlib import Path

          dist = Path("dist")
          version = "${{ steps.version.outputs.version }}"

          for path in sorted(dist.iterdir()):
            if not path.is_file():
              continue
            name = path.name
            if not name.startswith(f"sorted-{version}-"):
              continue

            latest_name = name.replace(f"sorted-{version}-", "sorted-latest-", 1)
            shutil.copyfile(path, dist / latest_name)

          files = sorted(path for path in dist.iterdir() if path.is_file())
          lines = []
          for path in files:
            digest = hashlib.sha256(path.read_bytes()).hexdigest()
            lines.append(f"{digest}  {path.name}")
          (dist / "sorted-checksums.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Sorted ${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*
